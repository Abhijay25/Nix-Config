$mainMod = SUPER

# Monitor
monitor = eDP-1, 1920x1080@60, 0x0, 1.25

# Startup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = swww-daemon && swww img ~/dotfiles/modules/home/shared/wallpapers/Tiger.png
exec-once = hyprshell run

# Input
input {
  kb_layout = us
  repeat_rate = 35
  repeat_delay = 200
  follow_mouse = 1
  accel_profile = flat
  touchpad {
    tap-to-click = true
  }
}

# Layout & Decoration
general {
  gaps_in = 3
  gaps_out = 5
  border_size = 2
  col.active_border = rgb(7fc8ff)
  col.inactive_border = rgb(505050)
  layout = dwindle
}

decoration {
  rounding = 4
  blur {
    enabled = true
    size = 4
    passes = 2
    new_optimizations = true
    xray = false
    noise = 0.02
    popups = true
  }
  shadow {
    enabled = false
  }
  dim_inactive = true
  dim_strength = 0.05
}

gesture = 3, horizontal, workspace

misc {
  vfr = true
  force_default_wallpaper = 0
  disable_hyprland_logo = true
}

animations {
  enabled = true

  bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
  bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = menu_decel, 0.1, 1, 0, 1
  bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
  bezier = liner, 1, 1, 1, 1

  animation = windowsIn,      1, 3,   emphasizedDecel, popin 80%
  animation = windowsOut,     1, 2,   emphasizedDecel, popin 90%
  animation = windowsMove,    1, 3,   emphasizedDecel, slide
  animation = fadeIn,         1, 3,   emphasizedDecel
  animation = fadeOut,        1, 2,   emphasizedDecel
  animation = layersIn,       1, 2.7, emphasizedDecel, popin 93%
  animation = layersOut,      1, 2.4, menu_accel,      popin 94%
  animation = fadeLayersIn,   1, 0.5, menu_decel
  animation = fadeLayersOut,  1, 2.7, liner
  animation = workspaces,     1, 5,   menu_decel,      slide
  animation = border,         1, 1,   liner
}

# Keybindings — General
bind = $mainMod SHIFT, E, exit
bind = $mainMod, Q, killactive
bind = $mainMod, T, exec, ghostty
bind = $mainMod, B, exec, brave --disable-background-networking --disable-component-update
bind = $mainMod, A, exec, noctalia-shell ipc call launcher toggle
bind = $mainMod, F, exec, thunar
bind = $mainMod, C, exec, code
bind = $mainMod, Backspace, exec, noctalia-shell ipc call sessionMenu toggle

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = CTRL, Print, exec, F=$(mktemp /tmp/screenshot-XXXXXX.png) && grim -g "$(slurp)" "$F" && satty -f "$F"; rm -f "$F"
bind = SHIFT, Print, exec, F=~/Pictures/Screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png && grim -g "$(slurp)" "$F" && wl-copy < "$F" && notify-send 'Screenshot saved' -t 2000

# Focus (vim-style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u

# Move window to monitor
bind = $mainMod SHIFT, left, movewindow, mon:l
bind = $mainMod SHIFT, right, movewindow, mon:r

# Focus monitor
bind = $mainMod, left, focusmonitor, l
bind = $mainMod, right, focusmonitor, r

# Workspaces — switch
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Workspaces — move window
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Floating / fullscreen
bind = $mainMod SHIFT, F, togglefloating
bind = ALT, Return, fullscreen, 1

# Alt-Tab via hyprshell (keybindings configured in ~/.config/hyprshell/config.ron)

# Media & brightness keys
bind  = , XF86AudioMute, exec, pamixer -t
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioMicMute, exec, pamixer --default-source -t

# Window rules
windowrule = match:class ^(com\.gabm\.satty)$, float on
windowrule = match:class ^(xdg-desktop-portal)(.*)$, float on
windowrule = match:class ^(polkit-gnome-.*)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-.*)$, float on
windowrule = match:class ^(engrampa)$, float on
windowrule = match:class ^(file-roller)$, float on
windowrule = match:class ^(seahorse)$, float on
windowrule = match:class ^(pinentry.*)$, float on
