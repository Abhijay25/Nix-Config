$mainMod = SUPER

# Startup
exec-once = noctalia-shell
exec-once = swww-daemon && swww img ~/dotfiles/wallpapers/Tiger.png
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = hyprswitch init --show-title

# Input
input {
  kb_layout = us
  repeat_rate = 35
  repeat_delay = 200
  follow_mouse = 1
  touchpad {
    tap-to-click = true
  }
}

# Layout & Decoration
general {
  gaps_in = 3
  gaps_out = 5
  border_size = 2
  col.active_border = rgb(7fc8ff)
  col.inactive_border = rgb(505050)
  layout = dwindle
}

decoration {
  rounding = 4
  blur {
    enabled = false
  }
  drop_shadow = false
}

animations {
  enabled = true
  animation = global, 1, 2, default
}

# Keybindings — General
bind = $mainMod SHIFT, E, exit
bind = $mainMod, Q, killactive
bind = $mainMod, T, exec, ghostty
bind = $mainMod, B, exec, brave --disable-background-networking --disable-component-update
bind = $mainMod, A, exec, noctalia-shell ipc call launcher toggle
bind = $mainMod, F, exec, thunar
bind = $mainMod, C, exec, code
bind = $mainMod, Backspace, exec, noctalia-shell ipc call sessionMenu toggle

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = CTRL, Print, exec, F=$(mktemp /tmp/screenshot-XXXXXX.png) && grim -g "$(slurp)" "$F" && satty -f "$F"; rm -f "$F"
bind = SHIFT, Print, exec, F=~/Pictures/Screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png && grim -g "$(slurp)" "$F" && wl-copy < "$F" && notify-send 'Screenshot saved' -t 2000

# Focus (vim-style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u

# Move window to monitor
bind = $mainMod SHIFT, left, movewindow, mon:l
bind = $mainMod SHIFT, right, movewindow, mon:r

# Focus monitor
bind = $mainMod, left, focusmonitor, l
bind = $mainMod, right, focusmonitor, r

# Workspaces — switch
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Workspaces — move window
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Floating / fullscreen
bind = $mainMod SHIFT, F, togglefloating
bind = ALT, Return, fullscreen, 1

# Alt-Tab via hyprswitch
bind = ALT, Tab, exec, hyprswitch gui --mod-key alt --key Tab --close mod-key-release
bind = ALT SHIFT, Tab, exec, hyprswitch gui --mod-key alt --key Tab --close mod-key-release --reverse

# Media & brightness keys
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioMicMute, exec, pamixer --default-source -t

# Window rules
windowrulev2 = float, class:^(com\.gabm\.satty)$
windowrulev2 = float, class:^(xdg-desktop-portal)(.*)$
windowrulev2 = float, class:^(polkit-gnome-.*)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-.*)$
windowrulev2 = float, class:^(engrampa)$
windowrulev2 = float, class:^(file-roller)$
windowrulev2 = float, class:^(seahorse)$
windowrulev2 = float, class:^(pinentry.*)$
